# Compose file for self-hosted deploys (runs on the zgo-vps GH Actions
# runner). Volume mounts use absolute paths under /opt/zgo-deploy so
# persistent state survives ephemeral runner checkouts.
#
# Traffic flow:
#   Internet -> Cloudflare (orange cloud, edge TLS)
#     -> host openresty :80 (already running, manages other domains too)
#       server_name *.zgi.app -> proxy_pass http://127.0.0.1:18090
#         -> Traefik :18090 (bound to loopback only, internal HTTP)
#           Host(zgo.zgi.app)  -> zgo-api:8025
#           Host(logs.zgi.app) -> dozzle:8080

services:
  traefik:
    image: traefik:v3.2
    container_name: traefik
    restart: unless-stopped
    ports:
      # Loopback-only: openresty (host net) proxies *.zgi.app here.
      - "127.0.0.1:18090:80"
      # Loopback dashboard / API.
      - "127.0.0.1:18081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=deploy_default
      - --entrypoints.web.address=:80
      - --log.level=INFO
      - --accesslog=true

  zgo-api:
    image: zgo-api:latest
    container_name: zgo-api
    restart: unless-stopped
    ports:
      - "8025:8025"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      SERVER_PORT: 8025
      SERVER_MODE: release
      DB_ENABLED: "false"
      TZ: Asia/Shanghai
    labels:
      traefik.enable: "true"
      traefik.http.routers.zgo.rule: "Host(`zgo.zgi.app`)"
      traefik.http.routers.zgo.entrypoints: "web"
      traefik.http.services.zgo.loadbalancer.server.port: "8025"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/zgo-deploy/dozzle/users.yml:/data/users.yml:ro
    environment:
      DOZZLE_AUTH_PROVIDER: simple
      DOZZLE_ENABLE_ACTIONS: "false"
      DOZZLE_HOSTNAME: zgo-vps-cn
      TZ: Asia/Shanghai
    labels:
      traefik.enable: "true"
      traefik.http.routers.dozzle.rule: "Host(`logs.zgi.app`)"
      traefik.http.routers.dozzle.entrypoints: "web"
      traefik.http.services.dozzle.loadbalancer.server.port: "8080"
